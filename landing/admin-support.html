<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Support — PassCRPE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #111827; }

    /* AUTH */
    .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .auth-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .auth-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; color: #374151; }
    input { padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-family: inherit; font-size: 14px; outline: none; }
    input:focus { border-color: #4f46e5; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #4f46e5; color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn:hover { background: #4338ca; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .err { font-size: 13px; color: #dc2626; margin-top: 8px; text-align: center; }

    /* DASHBOARD */
    .dashboard { display: none; }
    .top-bar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .top-bar-title { font-size: 15px; font-weight: 800; color: #111827; }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .badge-count { font-size: 12px; font-weight: 700; background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 20px; }
    .logout-btn { font-size: 13px; color: #6b7280; background: none; border: none; cursor: pointer; font-family: inherit; }
    .logout-btn:hover { color: #111827; }

    .layout { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 56px); }

    /* TICKET LIST */
    .ticket-list { border-right: 1px solid #e5e7eb; overflow-y: auto; background: #fff; }
    .list-header { padding: 16px; border-bottom: 1px solid #f3f4f6; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1.5px solid #e5e7eb; background: #fff; cursor: pointer; font-family: inherit; color: #6b7280; }
    .filter-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .ticket-item { padding: 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background .12s; }
    .ticket-item:hover { background: #f9fafb; }
    .ticket-item.selected { background: #eef2ff; border-left: 3px solid #4f46e5; }
    .ticket-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .ticket-prenom { font-size: 13px; font-weight: 700; color: #111827; }
    .ticket-date { font-size: 11px; color: #9ca3af; }
    .ticket-category { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .ticket-preview { font-size: 13px; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }
    .status-open     { background: #fef3c7; color: #92400e; }
    .status-answered { background: #d1fae5; color: #065f46; }
    .status-closed   { background: #f3f4f6; color: #6b7280; }

    /* TICKET DETAIL */
    .ticket-detail { overflow-y: auto; padding: 32px; background: #f9fafb; }
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #9ca3af; font-size: 14px; }
    .detail-header { margin-bottom: 24px; }
    .detail-name { font-size: 18px; font-weight: 800; color: #111827; margin-bottom: 4px; }
    .detail-email { font-size: 13px; color: #6b7280; }
    .detail-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-top: 8px; }
    .detail-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .detail-section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #9ca3af; margin-bottom: 10px; }
    .detail-message { font-size: 15px; color: #111827; line-height: 1.7; }
    .reply-form { display: flex; flex-direction: column; gap: 12px; }
    .reply-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; font-family: inherit; font-size: 14px; line-height: 1.6; outline: none; resize: vertical; min-height: 120px; }
    .reply-textarea:focus { border-color: #4f46e5; }
    .reply-actions { display: flex; gap: 10px; }
    .btn-reply { padding: 10px 24px; border: none; border-radius: 10px; background: #4f46e5; color: #fff; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-reply:hover { background: #4338ca; }
    .btn-close { padding: 10px 20px; border: 1.5px solid #e5e7eb; border-radius: 10px; background: #fff; color: #374151; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-close:hover { background: #f3f4f6; }
    .success-msg { font-size: 13px; font-weight: 600; color: #059669; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .ticket-detail { display: none; }
      .layout.show-detail .ticket-list { display: none; }
      .layout.show-detail .ticket-detail { display: block; }
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-title">Administration</div>
    <div class="auth-sub">Accès réservé à l'équipe PassCRPE</div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="adminEmail" placeholder="vous@exemple.fr" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="adminPassword" placeholder="••••••••" />
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Se connecter</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="top-bar">
    <div class="top-bar-title">🎓 PassCRPE — Support</div>
    <div class="top-bar-right">
      <span class="badge-count" id="openCount">0 en attente</span>
      <button class="logout-btn" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>
  <div class="layout" id="layout">
    <!-- TICKET LIST -->
    <div class="ticket-list">
      <div class="list-header">
        <button class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
        <button class="filter-btn" onclick="setFilter('open', this)">En attente</button>
        <button class="filter-btn" onclick="setFilter('answered', this)">Répondus</button>
        <button class="filter-btn" onclick="setFilter('closed', this)">Clôturés</button>
      </div>
      <div id="ticketList"><p style="padding:20px;font-size:13px;color:#9ca3af">Chargement…</p></div>
    </div>
    <!-- TICKET DETAIL -->
    <div class="ticket-detail" id="ticketDetail">
      <div class="detail-empty">Sélectionnez un ticket</div>
    </div>
  </div>
</div>

<script>
  const SB = window.supabase.createClient(
    'https://zqwcermgfvcusuwjfviz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxd2Nlcm1nZnZjdXN1d2pmdml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzkzMDYsImV4cCI6MjA4ODc1NTMwNn0.2QjrNafsARpnIA605-hh3jZWjMxZoyQzGTC3LL99Wr8'
  );

  const ADMIN_EMAIL = 'mohamed.necib94310@gmail.com';
  let allTickets = [];
  let currentFilter = 'all';
  let selectedId = null;

  // Check existing session
  SB.auth.getSession().then(({ data }) => {
    if (data.session?.user?.email === ADMIN_EMAIL) showDashboard();
  });

  async function doLogin() {
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const btn      = document.getElementById('loginBtn');
    const err      = document.getElementById('loginErr');
    if (email !== ADMIN_EMAIL) { err.textContent = 'Accès non autorisé.'; return; }
    btn.disabled = true; btn.textContent = 'Connexion…'; err.textContent = '';
    const { error } = await SB.auth.signInWithPassword({ email, password });
    if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    showDashboard();
  }

  async function doLogout() {
    await SB.auth.signOut();
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }

  function showDashboard() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadTickets();
  }

  async function loadTickets() {
    const { data } = await SB.from('support_tickets').select('*').order('created_at', { ascending: false });
    allTickets = data || [];
    const open = allTickets.filter(t => t.status === 'open').length;
    document.getElementById('openCount').textContent = open + ' en attente';
    renderList();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const filtered = currentFilter === 'all' ? allTickets : allTickets.filter(t => t.status === currentFilter);
    const el = document.getElementById('ticketList');
    if (!filtered.length) { el.innerHTML = '<p style="padding:20px;font-size:13px;color:#9ca3af">Aucun ticket</p>'; return; }
    el.innerHTML = filtered.map(t => `
      <div class="ticket-item ${t.id === selectedId ? 'selected' : ''}" onclick="selectTicket('${t.id}')">
        <div class="ticket-meta">
          <span class="ticket-prenom">${t.user_prenom || t.user_email}</span>
          <span class="ticket-date">${new Date(t.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
        <div class="ticket-category">${t.category}</div>
        <div class="ticket-preview">${t.message}</div>
        <span class="status-pill status-${t.status}">${{open:'En attente',answered:'Répondu',closed:'Clôturé'}[t.status]}</span>
      </div>
    `).join('');
  }

  function selectTicket(id) {
    selectedId = id;
    const t = allTickets.find(t => t.id === id);
    if (!t) return;
    renderList();
    document.getElementById('layout').classList.add('show-detail');
    const d = document.getElementById('ticketDetail');
    d.innerHTML = `
      <div class="detail-header">
        <div class="detail-name">${t.user_prenom || '—'}</div>
        <div class="detail-email">${t.user_email}</div>
        <span class="detail-badge status-${t.status} status-pill">${{open:'En attente',answered:'Répondu',closed:'Clôturé'}[t.status]}</span>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Catégorie</div>
        <div class="detail-message">${t.category}</div>
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Message de l'utilisateur</div>
        <div class="detail-message">${t.message.replace(/\n/g, '<br>')}</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:8px">${new Date(t.created_at).toLocaleString('fr-FR')}</div>
      </div>

      ${t.admin_reply ? `
        <div class="detail-section" style="border-color:#a5f3fc;background:#f0fdff">
          <div class="detail-section-label" style="color:#0e7490">Votre réponse</div>
          <div class="detail-message">${t.admin_reply.replace(/\n/g, '<br>')}</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:8px">${new Date(t.admin_replied_at).toLocaleString('fr-FR')}</div>
        </div>
      ` : ''}

      <div class="detail-section">
        <div class="detail-section-label">Répondre</div>
        <div class="reply-form">
          <textarea class="reply-textarea" id="replyText" placeholder="Votre réponse…">${t.admin_reply || ''}</textarea>
          <div class="reply-actions">
            <button class="btn-reply" onclick="sendReply('${t.id}', 'answered')">Envoyer la réponse</button>
            <button class="btn-close" onclick="closeTicket('${t.id}')">Clôturer</button>
          </div>
          <div id="replyMsg" style="font-size:13px;margin-top:4px"></div>
        </div>
      </div>
    `;
  }

  async function sendReply(id, status) {
    const reply = document.getElementById('replyText').value.trim();
    if (!reply) { document.getElementById('replyMsg').textContent = 'Réponse vide.'; return; }
    document.getElementById('replyMsg').textContent = 'Envoi…';
    const { error } = await SB.from('support_tickets').update({
      admin_reply: reply,
      admin_replied_at: new Date().toISOString(),
      status,
    }).eq('id', id);
    if (error) { document.getElementById('replyMsg').textContent = 'Erreur : ' + error.message; return; }
    document.getElementById('replyMsg').innerHTML = '<span style="color:#059669;font-weight:600">✓ Réponse enregistrée</span>';
    await loadTickets();
    selectTicket(id);
  }

  async function closeTicket(id) {
    await SB.from('support_tickets').update({ status: 'closed' }).eq('id', id);
    await loadTickets();
    document.getElementById('ticketDetail').innerHTML = '<div class="detail-empty">Ticket clôturé</div>';
    selectedId = null;
  }

  // Enter key on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('authScreen').style.display !== 'none') doLogin();
  });
</script>
</body>
</html>
