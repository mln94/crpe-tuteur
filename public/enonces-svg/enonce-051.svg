<rect x="30" y="55" width="420" height="240" rx="8" fill="white" stroke="#e0e7ff" stroke-width="1.5"/><text x="240" y="47" fill="#4f46e5" font-size="15" font-weight="700" text-anchor="middle">Puissances de 10 — exposants négatifs</text><line x1="50" y1="170" x2="450" y2="170" stroke="#1e1b4b" stroke-width="2"/><line x1="50" y1="164" x2="50" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="50" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁻5</text><text x="50" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">0,00001</text><line x1="130" y1="164" x2="130" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="130" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁻4</text><text x="130" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">0,0001</text><line x1="210" y1="164" x2="210" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="210" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁻3</text><text x="210" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">0,001</text><line x1="290" y1="164" x2="290" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="290" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁻2</text><text x="290" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">0,01</text><line x1="370" y1="164" x2="370" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="370" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁻1</text><text x="370" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">0,1</text><line x1="450" y1="164" x2="450" y2="176" stroke="#1e1b4b" stroke-width="1.5"/><text x="450" y="160" fill="#4f46e5" font-size="11" font-weight="700" text-anchor="middle">10⁰</text><text x="450" y="192" fill="#6b7280" font-size="9" font-weight="400" text-anchor="middle">1</text><rect x="30" y="220" width="420" height="30" rx="6" fill="#ede9fe" stroke="#4f46e5"/><text x="240" y="239" fill="#4f46e5" font-size="12" font-weight="600" text-anchor="middle">Un atome ≈ 10⁻¹⁰ m   |   Un cheveu ≈ 10⁻⁴ m</text><text x="240" y="318" fill="#6b7280" font-size="11" font-weight="400" text-anchor="middle">Plus l'exposant est petit (négatif), plus la valeur est petite</text>
