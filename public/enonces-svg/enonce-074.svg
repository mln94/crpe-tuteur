<rect x="40" y="50" width="400" height="265" rx="8" fill="white" stroke="#e0e7ff" stroke-width="1.5"/><text x="240" y="44" fill="#4f46e5" font-size="15" font-weight="700" text-anchor="middle">Résolution par tâtonnement : 2x + 3 = 9</text><rect x="40" y="62" width="400" height="28" rx="6" fill="#4f46e5" stroke="none"/><text x="130" y="78" fill="white" font-size="12" font-weight="700" text-anchor="middle">x</text><text x="250" y="78" fill="white" font-size="12" font-weight="700" text-anchor="middle">2x + 3</text><text x="370" y="78" fill="white" font-size="12" font-weight="700" text-anchor="middle">= 9 ?</text><rect x="40" y="92" width="400" height="38" rx="0" fill="white" stroke="#e0e7ff"/><text x="130" y="116" fill="#1e1b4b" font-size="13" font-weight="700" text-anchor="middle">1</text><text x="250" y="116" fill="#1e1b4b" font-size="13" font-weight="400" text-anchor="middle">2×1+3 = 5</text><text x="370" y="116" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">Trop petit</text><rect x="40" y="132" width="400" height="38" rx="0" fill="#f5f3ff" stroke="#e0e7ff"/><text x="130" y="156" fill="#1e1b4b" font-size="13" font-weight="700" text-anchor="middle">2</text><text x="250" y="156" fill="#1e1b4b" font-size="13" font-weight="400" text-anchor="middle">2×2+3 = 7</text><text x="370" y="156" fill="#ef4444" font-size="13" font-weight="700" text-anchor="middle">Trop petit</text><rect x="40" y="172" width="400" height="38" rx="0" fill="white" stroke="#e0e7ff"/><text x="130" y="196" fill="#1e1b4b" font-size="13" font-weight="700" text-anchor="middle">3</text><text x="250" y="196" fill="#1e1b4b" font-size="13" font-weight="400" text-anchor="middle">2×3+3 = 9</text><text x="370" y="196" fill="#10b981" font-size="13" font-weight="700" text-anchor="middle">✓ Solution !</text><rect x="40" y="212" width="400" height="30" rx="6" fill="#dcfce7" stroke="none"/><text x="240" y="232" fill="#15803d" font-size="15" font-weight="700" text-anchor="middle">La solution est x = 3</text>
